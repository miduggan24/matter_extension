name: Copy Contents

on:
    workflow_call:
        inputs:
            build-type:
                required: true
                type: string

concurrency:
    group: copy-contents-build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lighting-app-efr-copy:
        name: Copy Contents - Lighting App EFR
        uses: ./.github/workflows/builder.yaml
        with:
            json-file-path: './.github/silabs-builds-copy-contents-efr.json'
            path-to-example-app: slc/sample-app/lighting-app/efr32/lighting-app-thread.slcp
            example-app: lighting-app
            build-type: ${{ inputs.build-type }}
            platform: efr-copy-contents

    thermostat-efr-copy:
        name: Copy Contents - Thermostat EFR (RS911X)
        uses: ./.github/workflows/builder.yaml
        with:
            json-file-path: './.github/silabs-builds-copy-contents-efr.json'
            path-to-example-app: slc/sample-app/thermostat/efr32/thermostat-rs911x.slcp
            example-app: thermostat
            build-type: ${{ inputs.build-type }}
            platform: efr-copy-contents

    lock-app-efr-copy:
        name: Copy Contents - Lock App EFR (WF200)
        uses: ./.github/workflows/builder.yaml
        with:
            json-file-path: './.github/silabs-builds-copy-contents-efr.json'
            path-to-example-app: slc/sample-app/lock-app/efr32/lock-app-wf200.slcp
            example-app: lock-app
            build-type: ${{ inputs.build-type }}
            platform: efr-copy-contents

    window-app-efr-copy:
