        with:
            json-file-path: './.github/silabs-builds-copy-contents-efr.json'
            path-to-example-app: slc/sample-app/zigbee-matter-light/efr32/zigbee-matter-light.slcp
            example-app: zigbee-matter-light
            build-type: ${{ inputs.build-type }}
            platform: efr-copy-contents

    light-switch-app-efr-copy:
        if: ${{ inputs.build-type == 'full' }}
        name: Copy Contents - Light Switch App EFR
